# cargo-deny configuration for Soroban-ZK-Std
# Stellar Foundation Grant Submission — dependency audit policy
# https://embarkstudios.github.io/cargo-deny/

[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "Unicode-3.0",
    "Zlib",
]
confidence-threshold = 0.8

[advisories]
version = 2
# Each entry below was individually reviewed — not a blanket waiver.
ignore = [
    { id = "RUSTSEC-2024-0436", reason = "paste is a transitive dep of soroban-env-host v25.0.1 and ark-ff v0.4.2. Maintenance-only notice, no CVE or exploit. No upgrade path exists within soroban-sdk 25.3.0." },
    { id = "RUSTSEC-2024-0388", reason = "derivative is a transitive dep of ark-ec v0.4.2 and ark-ff v0.4.2, pulled in by soroban-env-host v25.0.1. Maintenance-only notice, no CVE or exploit. No upgrade path within the ark 0.4.x series used by soroban-env-host." },
]

[bans]
multiple-versions = "warn"
wildcards = "allow"

[sources]
unknown-registry = "deny"
unknown-git = "warn"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
